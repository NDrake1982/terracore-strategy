<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terracore Group</title>
<style>
  :root{--bg:#08090c;--panel:#11141a;--line:#262c37;--text:#e9ecf1;--muted:#9aa3b2;--air:#f5821f;--water:#2aa5d8;--rentx:#e0231d}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI",Inter,system-ui,-apple-system,sans-serif;overflow:hidden}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #burst{position:absolute;left:50%;top:50%;width:880px;height:880px;margin:-440px 0 0 -440px;opacity:.16;will-change:transform;pointer-events:none}
  .gate{position:relative;width:344px;max-width:92vw;text-align:center;transition:opacity .35s ease,transform .35s ease}
  .gate img.logo{height:44px;filter:invert(1) brightness(1.35);margin-bottom:30px}
  .card{background:rgba(17,20,26,.92);border:1px solid var(--line);border-radius:16px;padding:30px 28px 26px;backdrop-filter:blur(6px);text-align:left}
  .kick{font-size:11px;font-weight:800;letter-spacing:.3em;text-transform:uppercase;color:var(--air);margin-bottom:6px}
  h1{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  input{width:100%;background:#0b0d10;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;font-family:inherit}
  input:focus{border-color:var(--air)}
  button{width:100%;margin-top:22px;background:var(--air);border:none;border-radius:99px;padding:12px;font-size:14px;font-weight:800;letter-spacing:.04em;color:#10100e;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(245,130,31,.35);transition:transform .15s}
  button:hover{transform:translateY(-1px)}
  .remember{display:flex;align-items:center;gap:8px;margin:16px 0 0;font-size:12.5px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--muted);cursor:pointer}
  .remember input{width:auto;accent-color:var(--air);cursor:pointer}
  .err{margin-top:12px;font-size:12.5px;color:#e0556b;min-height:17px;visibility:hidden}
  .pill{margin-top:22px;display:inline-block;border:1px solid var(--line);border-radius:99px;padding:5px 14px;font-size:11.5px;color:var(--muted)}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  #stinger{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:5}
  .bs{position:absolute;display:flex;flex-direction:column;align-items:center;opacity:0}
  .bs img{height:62px}
  .bs .bar{height:3px;width:0;margin-top:20px;border-radius:2px}
  #flash{position:fixed;inset:0;background:#f5821f;opacity:0;pointer-events:none;z-index:9}
</style>
</head>

// ---- dotted burst (same generator + base speed as the site: one turn / 140s) ----
(function(){
  const g=document.getElementById('bg-burst');let d='';
  for(let ring=1;ring<=9;ring++){
    const n=6+ring*4,r=ring*10.5,dot=Math.max(.7,2.6-ring*.22);
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+(ring%2?0.12:0);
      d+='<circle cx="'+(100+Math.cos(a)*r).toFixed(2)+'" cy="'+(100+Math.sin(a)*r).toFixed(2)+'" r="'+dot+'"/>';
    }
  }
  g.innerHTML=d;
})();
const burst=document.getElementById('burst');
let angle=0,speed=360/140,scale=1,accel=false,last=performance.now();
function tick(now){
  const dt=Math.min((now-last)/1000,.05);last=now;
  if(accel){
    speed=Math.min(speed+ (speed*2.4+220)*dt, 1100);
    scale=Math.min(scale+scale*2.1*dt, 7.5);
  }
  angle=(angle+speed*dt)%360;
  burst.style.transform='rotate('+angle+'deg) scale('+scale+')';
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---- crypto ----
function b64b(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function tryDecrypt(keyObj){
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:b64b(PAYLOAD.iv)},keyObj,b64b(PAYLOAD.ct));
  const txt=new TextDecoder().decode(pt);
  if(txt.slice(0,15).toLowerCase().indexOf('<!doctype')!==0)throw new Error('bad');
  return txt;
}
async function deriveKey(cred){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(cred),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64b(PAYLOAD.salt),iterations:PAYLOAD.iter,hash:'SHA-256'},km,{name:'AES-CBC',length:256},true,['decrypt']);
}
let SITE=null;
function openSite(){
  // Defer to a clean macrotask. On the auto-unlock path openSite runs from an async
  // continuation where document.open() can append the new document instead of replacing
  // the gate; a fresh timeout task has no active parser, so open() reliably clears first.
  setTimeout(function(){
    document.open();
    document.write(SITE);
    document.close();
  },0);
}

// prefill remembered credentials (stored only in THIS browser, never in the published file)
(function(){
  try{
    const r=JSON.parse(localStorage.getItem('tc-remember')||'null');
    if(r){document.getElementById('u').value=r.u||'';document.getElementById('p').value=r.p||'';document.getElementById('rm').checked=true;}
  }catch(e){}
})();

// already unlocked in this tab? skip the ceremony
(async()=>{
  try{
    const k=sessionStorage.getItem('tc-k');
    if(!k)return;
    const keyObj=await crypto.subtle.importKey('raw',b64b(k),{name:'AES-CBC'},false,['decrypt']);
    SITE=await tryDecrypt(keyObj);
    openSite();
  }catch(e){sessionStorage.removeItem('tc-k')}
})();

document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err'),card=document.querySelector('.card');
  err.style.visibility='hidden';
  try{
    const uVal=document.getElementById('u').value.trim();
    const pVal=document.getElementById('p').value.trim();
    const cred=uVal.toLowerCase()+':'+pVal;
    const keyObj=await deriveKey(cred);
    SITE=await tryDecrypt(keyObj);
    const raw=await crypto.subtle.exportKey('raw',keyObj);
    sessionStorage.setItem('tc-k',btoa(String.fromCharCode.apply(null,new Uint8Array(raw))));
    if(document.getElementById('rm').checked){
      localStorage.setItem('tc-remember',JSON.stringify({u:uVal,p:pVal}));
    }else{
      localStorage.removeItem('tc-remember');
    }
    unlock();
  }catch(ex){
    err.style.visibility='visible';
    card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');
  }
});

// ---- unlock sequence ----
function unlock(){
  const gate=document.getElementById('gate');
  gate.style.opacity=0;gate.style.transform='scale(.96)';
  accel=true;
  burst.style.opacity=.55;
  setTimeout(()=>{burst.style.transition='opacity .4s';burst.style.opacity=0},1500);
  setTimeout(stinger,1780);
}
function stinger(){
  const st=document.getElementById('stinger');st.style.display='flex';
  const items=[...st.querySelectorAll('.bs')];
  items.forEach((el,i)=>{
    setTimeout(()=>flickIn(el),i*680);
    setTimeout(()=>{el.style.transition='opacity .18s';el.style.opacity=0},i*680+600);
  });
  setTimeout(()=>{
    const f=document.getElementById('flash');
    f.style.transition='opacity .12s';f.style.opacity=.85;
    setTimeout(openSite,130);
  },items.length*680+140);
}
function flickIn(el){
  el.style.opacity=1;
  el.animate([{opacity:0},{opacity:1,offset:.18},{opacity:.25,offset:.32},{opacity:1,offset:.48},{opacity:1}],{duration:430});
  el.animate([{transform:'scale(1.18)'},{transform:'scale(1)'}],{duration:430,easing:'cubic-bezier(.2,.9,.2,1)'});
  el.querySelector('.bar').animate([{width:'0px'},{width:'190px'}],{duration:440,easing:'cubic-bezier(.2,.9,.2,1)',fill:'forwards'});
}
</script>
